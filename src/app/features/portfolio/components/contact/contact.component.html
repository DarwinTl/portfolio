<div class="flex justify-center items-center w-full">
  <div
    class="w-full max-w-lg p-8 bg-zinc-800/70 rounded-xl shadow-md flex flex-col"
  >
    <!-- Título con SVG -->
    <h2
      class="text-2xl font-bold mb-6 text-white flex items-center justify-center gap-3"
    >
      <span class="w-6 h-6">
        <!-- SVG del correo -->
        <svg
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          class="w-6 h-6 text-white"
        >
          <path stroke="none" d="M0 0h24v24H0z" fill="none" />
          <path
            d="M19 22.5a4.75 4.75 0 0 1 3.5 -3.5a4.75 4.75 0 0 1 -3.5 -3.5a4.75 4.75 0 0 1 -3.5 3.5a4.75 4.75 0 0 1 3.5 3.5"
          />
          <path
            d="M11.5 19h-6.5a2 2 0 0 1 -2 -2v-10a2 2 0 0 1 2 -2h14a2 2 0 0 1 2 2v5"
          />
          <path d="M3 7l9 6l9 -6" />
        </svg>
      </span>
      Contáctame
    </h2>

    <!-- Formulario -->
    <form
      [formGroup]="contactForm"
      (ngSubmit)="sendEmail()"
      class="flex flex-col gap-5"
    >
      <!-- Nombre -->
      <div class="flex flex-col">
        <label for="name" class="mb-2 font-semibold text-white">Nombre</label>
        <input
          id="name"
          type="text"
          pInputText
          formControlName="name"
          class="custom-input"
        />
      </div>

      <!-- Email -->
      <div class="flex flex-col">
        <label for="email" class="mb-2 font-semibold text-white">Email</label>
        <input
          id="email"
          type="email"
          pInputText
          formControlName="email"
          class="custom-input"
        />
      </div>

      <!-- Mensaje -->
      <div class="flex flex-col">
        <label for="message" class="mb-2 font-semibold text-white"
          >Mensaje</label
        >
        <textarea
          id="message"
          rows="6"
          pInputTextarea
          formControlName="message"
          autoResize="true"
          class="custom-input"
        ></textarea>
      </div>

      <!-- Botón estilo PrimeNG -->
      <div class="flex justify-center mt-4">
        <p-button
          type="submit"
          label="Enviar Mensaje"
          icon="pi pi-send"
          class="p-button-rounded p-button-lg"
          [disabled]="contactForm.invalid"
        ></p-button>
      </div>
    </form>
  </div>
</div>
